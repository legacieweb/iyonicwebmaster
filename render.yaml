services:
  - type: web
    name: iyonicweb
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: VITE_PAYSTACK_PUBLIC_KEY
        sync: false
      - key: VITE_ADMIN_EMAIL
        sync: false
      - key: VITE_ADMIN_PASSWORD
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
