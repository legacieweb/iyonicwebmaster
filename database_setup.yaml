# PocketBase Collection Schema Definitions for Iyonicorp
# Usage: Use this as a reference to manually create or automate collection creation in PocketBase.
# Sync date: 2024-03-05 (Updated from live PocketBase schema)

collections:
  - name: "users" # System auth collection
    type: "auth"
    fields:
      - name: "email"
        type: "email"
        required: true
      - name: "first_name"
        type: "text"
        required: true
      - name: "last_name"
        type: "text"
        required: true
      - name: "phone_number"
        type: "text"
        required: false
      - name: "avatar"
        type: "file"
        options:
          maxSelect: 1
          maxSize: 5242880
          mimeTypes: ["image/jpeg", "image/png", "image/svg+xml", "image/gif", "image/webp"]

  - name: "projects"
    type: "base"
    fields:
      - name: "title"
        type: "text"
      - name: "userId"
        type: "relation"
        options:
          collectionId: "users"
          maxSelect: 1
      - name: "description"
        type: "text"
      - name: "category"
        type: "text"
      - name: "image"
        type: "file"
        options:
          maxSelect: 1
      - name: "thumbnail"
        type: "text"
      - name: "domain"
        type: "text"
      - name: "template"
        type: "select"
        options: ["custom", "startup-minimal", "agency-website", "landing-page-pro", "ecommerce-store", "creative-portfolio", "modern-business"]
      - name: "status"
        type: "select"
        options: ["draft", "published", "archived"]
      - name: "views"
        type: "number"
      - name: "visits"
        type: "number"
      - name: "metaTitle"
        type: "text"
      - name: "metaDescription"
        type: "text"
      - name: "metaKeywords"
        type: "text"
      - name: "blocks"
        type: "json"
      - name: "content"
        type: "json"
      - name: "settings"
        type: "json"
      - name: "favicon"
        type: "file"
        options:
          maxSelect: 1
      - name: "wh"
        type: "file"
        options:
          maxSelect: 1

  - name: "websites"
    type: "base"
    fields:
      - name: "name"
        type: "text"
      - name: "userId"
        type: "relation"
        options:
          collectionId: "users"
          maxSelect: 1
      - name: "description"
        type: "text"
      - name: "domain"
        type: "text"
      - name: "template"
        type: "select"
        options: ["custom", "startup-minimal", "agency-website", "landing-page-pro", "ecommerce-store", "creative-portfolio", "modern-business"]
      - name: "blocks"
        type: "json"
      - name: "status"
        type: "select"
        options: ["draft", "published", "archived"]
      - name: "views"
        type: "number"
      - name: "visits"
        type: "number"
      - name: "metaTitle"
        type: "text"
      - name: "metaDescription"
        type: "text"
      - name: "metaKeywords"
        type: "text"
      - name: "settings"
        type: "json"
      - name: "content"
        type: "json"
      - name: "favicon"
        type: "file"
        options:
          maxSelect: 1
      - name: "logo"
        type: "file"
        options:
          maxSelect: 1

  - name: "orders"
    type: "base"
    fields:
      - name: "userId"
        type: "relation"
        options:
          collectionId: "users"
          maxSelect: 1
      - name: "order_number"
        type: "text"
      - name: "service_id"
        type: "text"
      - name: "service_name"
        type: "text"
      - name: "plan_name"
        type: "text"
      - name: "amount"
        type: "number"
      - name: "status"
        type: "select"
        options: ["pending", "completed", "cancelled", "paid"]
      - name: "items"
        type: "json"
      - name: "description"
        type: "text"

  - name: "leads"
    type: "base"
    fields:
      - name: "name"
        type: "text"
      - name: "message"
        type: "text"
      - name: "email"
        type: "text" # Note: schema says text, though email type exists

  - name: "support_tickets"
    type: "base"
    fields:
      - name: "userId"
        type: "relation"
        options:
          collectionId: "users"
          maxSelect: 1
      - name: "message"
        type: "text"
      - name: "status"
        type: "select"
        options: ["open", "in_progress", "resolved", "closed"]
      - name: "priority"
        type: "select"
        options: ["low", "medium", "high"]

  - name: "templates"
    type: "base"
    fields:
      - name: "name"
        type: "text"
      - name: "pages"
        type: "json"
      - name: "status"
        type: "select"
        options: ["draft", "published"]
      - name: "deployed"
        type: "bool"
      - name: "category"
        type: "text"
      - name: "description"
        type: "text"

  - name: "analytics"
    type: "base"
    fields:
      - name: "websiteId"
        type: "relation"
        options:
          collectionId: "websites"
          maxSelect: 1
      - name: "date"
        type: "date"
      - name: "views"
        type: "number"
      - name: "uniqueVisitors"
        type: "number"
      - name: "bounceRate"
        type: "number"
      - name: "avgSessionDuration"
        type: "number"
